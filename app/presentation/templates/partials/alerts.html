{% if success %}
  <section class="page-section">
    <article class="alert alert--success">
      <p class="alert__eyebrow">Success</p>
      <p class="alert__message">{{ success }}</p>
    </article>
  </section>
{% endif %}

{% if error %}
  <section class="page-section">
    <article class="alert alert--error">
      <p class="alert__eyebrow">Error</p>
      <p class="alert__message">{{ error }}</p>
    </article>
  </section>
{% endif %}

{% if info %}
  <section class="page-section">
    <article class="alert alert--info">
      <p class="alert__eyebrow">Info</p>
      <p class="alert__message">{{ info }}</p>
    </article>
  </section>
{% endif %}

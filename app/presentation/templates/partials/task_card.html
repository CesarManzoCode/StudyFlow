<article class="card task-card priority-{{ task.priority.value }}">
  <a href="/tasks/{{ task.task.id }}" class="task-card__link">

    <div class="task-card__header">
      <div class="task-card__title">
        {{ task.task.title }}
      </div>

      <span class="priority-badge priority-badge--{{ task.priority.value }}">
        {{ task.priority.value }}
      </span>
    </div>

    <div class="task-card__meta">
      <span class="task-card__course">
        {{ task.task.course_name }}
      </span>

      {% if task.task.due_at %}
        <span class="task-card__due">
          ⏰ {{ task.task.due_at }}
        </span>
      {% else %}
        <span class="task-card__due task-card__due--none">
          Sin fecha
        </span>
      {% endif %}
    </div>

  </a>
</article>
